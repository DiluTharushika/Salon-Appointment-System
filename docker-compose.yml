services:
  db:
    image: postgres:15
    container_name: salon_db
    restart: always
    environment:
      POSTGRES_USER: salonuser
      POSTGRES_PASSWORD: salonpass
      POSTGRES_DB: salondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: salon_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: salon_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

volumes:
  postgres_data: